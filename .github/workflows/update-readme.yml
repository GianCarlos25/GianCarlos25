name: 🟢 Daily Commit

on:
  schedule:
    - cron: '0 12 * * *'  # Cada día a las 12:00 UTC
  workflow_dispatch:

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🕐 Actualizar timestamp oculto
        run: |
          # Borra la línea anterior y agrega la fecha de hoy
          # Es un comentario HTML invisible, no se ve en tu perfil
          sed -i '/<!-- last-update:/d' README.md
          echo "<!-- last-update: $(date '+%Y-%m-%d') -->" >> README.md

      - name: 💾 Commit y Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "🟢 daily commit $(date '+%Y-%m-%d')"
          git push
